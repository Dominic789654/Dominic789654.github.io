name: Update interview pitch citations

on:
  schedule:
    # Mondays at 04:23 UTC (= 12:23 Beijing time, shortly after the bib refresh)
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh citation counts from scholar_tracker
        run: node scripts/update-pitch.mjs

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet -- public/talks/interview-pitch.html; then
            echo "No pitch citation changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/talks/interview-pitch.html
          git commit -m "chore(pitch): refresh citation counts from scholar_tracker"
          git push origin "HEAD:${DEFAULT_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.commit.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
